services:
  traefik-dashboard:
    image: nginx:alpine
    container_name: traefik-dashboard
    restart: always
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.hostname=traefik-dashboard"
      - "traefik.http.services.traefik-dashboard.loadbalancer.server.port=80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./www:/usr/share/nginx/html:ro

networks:
  proxy:
    external: true
    name: proxy
